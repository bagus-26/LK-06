<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
  <!--- Ini adalah contoh form sederhana untuk mengirim data ke halaman receive.html menggunakan metode POST--->
<body>
    <!---Formulir untuk mengirim data ke receive.html dengan sederhana--->
    <form action="receive.html" method="post">
        <label for="nama">Nama:</label> <br>
        <input type="text" id="nama" name="nama"> <br>
        <label for="email">Email:</label> <br>
        <input type="email" id="email" name="email">  <br>
        <label for="nomor hp">Nomor Hp:</label> <br>
        <input type="nomor hp" id="nomor hp" name="nomor hp"><br>
        <label for="kategori">Kategori:</label> <br>
        <input type="kategori" id="kategori" name="kategori" ><br>
        <label for="pesan">Pesan:</label> <br>
        <input type="pesan" id="pesan" name="pesan"><br>
         <br>
        <button type="submit">Submit</button>
        <br>
    </form>

</body>

</html>
